app:
  name: API Gateway
  flow-enrichment:
    data-category-field: data_category
  routes:
    orders:
      uri: https://service-commandes.internal
      target-application: Service commandes
      data-category: ORDER_PAYLOAD
      inbound-data-category: ORDER_SUBMISSION
    payments:
      uri: https://paiements.internal
      target-application: Paiements
      data-category: PAYMENT_REQUEST
    customers:
      uri: https://base-clients.internal
      target-application: Base clients
      data-category: CUSTOMER_LOOKUP
  callers:
    - Portail client
